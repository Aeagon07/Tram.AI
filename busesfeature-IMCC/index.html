<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pune Bus Route Finder</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
      border-bottom: 2px solid #00c8ff;
      padding: 16px 20px;
      box-shadow: 0 4px 20px rgba(0, 200, 255, 0.1);
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 24px;
      font-weight: 700;
      color: #00c8ff;
      letter-spacing: 1px;
    }

    .header-title p {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      align-items: center;
      flex: 1;
      max-width: 600px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      position: relative;
    }

    .search-input::placeholder {
      color: #666;
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: #00c8ff;
      box-shadow: 0 0 15px rgba(0, 200, 255, 0.2);
    }

    /* Autocomplete Dropdown */
    .search-input-wrapper {
      flex: 1;
      position: relative;
    }

    .autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(15, 15, 35, 0.95);
      border: 1px solid rgba(0, 200, 255, 0.4);
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      margin-top: -4px;
    }

    .autocomplete-dropdown.active {
      display: block;
    }

    .autocomplete-item {
      padding: 10px 16px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
      color: #bbb;
      transition: all 0.2s;
    }

    .autocomplete-item:hover {
      background: rgba(0, 200, 255, 0.15);
      color: #00c8ff;
      padding-left: 20px;
    }

    .autocomplete-item:last-child {
      border-bottom: none;
    }

    .swap-btn {
      padding: 12px 14px;
      background: rgba(0, 200, 255, 0.1);
      border: 1px solid #00c8ff;
      border-radius: 8px;
      color: #00c8ff;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .swap-btn:hover {
      background: rgba(0, 200, 255, 0.2);
      transform: scale(1.05);
    }

    .search-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #00c8ff 0%, #0096d4 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
    }

    .search-btn:hover {
      box-shadow: 0 8px 20px rgba(0, 200, 255, 0.4);
      transform: translateY(-2px);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    .stats {
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }

    .stat-item {
      text-align: center;
    }

    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #00c8ff;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Main Container */
    .main-container {
      display: flex;
      flex: 1;
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
    }

    .panel {
      background: rgba(15, 15, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 14px;
      backdrop-filter: blur(10px);
    }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      color: #00c8ff;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .layer-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .layer-item:hover {
      background: rgba(0, 200, 255, 0.1);
    }

    .layer-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #bbb;
    }

    .layer-color {
      width: 16px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .toggle-switch {
      width: 40px;
      height: 22px;
      background: #333;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-switch.active {
      background: #00c8ff;
    }

    .toggle-dot {
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left 0.3s;
    }

    .toggle-switch.active .toggle-dot {
      left: 20px;
    }

    /* Results Panel */
    .results-panel {
      width: 320px;
      background: rgba(15, 15, 35, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      display: none;
      backdrop-filter: blur(10px);
    }

    .results-panel.active {
      display: flex;
    }

    .results-header {
      padding: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .selected-route-info {
      padding: 12px 14px;
      background: rgba(0, 200, 255, 0.15);
      border-bottom: 1px solid rgba(0, 200, 255, 0.3);
      display: none;
    }

    .selected-route-info.active {
      display: block;
    }

    .selected-route-info .route-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .selected-route-info .route-details {
      font-size: 12px;
      color: #e0e0e0;
      line-height: 1.6;
    }

    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .result-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .result-item:hover {
      background: rgba(0, 200, 255, 0.1);
      border-color: #00c8ff;
      transform: translateX(4px);
    }

    .result-item.selected {
      background: rgba(0, 200, 255, 0.2);
      border-color: #00c8ff;
      box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
    }

    .result-item.compared {
      background: rgba(255, 102, 0, 0.15);
      border-color: #ff6600;
      box-shadow: 0 0 10px rgba(255, 102, 0, 0.2);
    }

    /* Comparison Panel */
    .comparison-panel {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(15, 15, 35, 0.95);
      border: 2px solid rgba(0, 200, 255, 0.5);
      border-radius: 12px;
      padding: 16px;
      width: 380px;
      max-height: 400px;
      overflow-y: auto;
      backdrop-filter: blur(10px);
      z-index: 500;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .comparison-panel.active {
      display: block;
    }

    .comparison-title {
      font-size: 13px;
      font-weight: 700;
      color: #00c8ff;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .comparison-bus {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .comparison-bus.route-1 {
      border-left: 4px solid #00ff00;
    }

    .comparison-bus.route-2 {
      border-left: 4px solid #ff6600;
    }

    .comparison-bus.route-3 {
      border-left: 4px solid #00ffff;
    }

    .comp-route-id {
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .comp-desc {
      color: #aaa;
      margin-bottom: 8px;
      font-size: 11px;
      line-height: 1.4;
    }

    .comp-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .comp-detail-item {
      background: rgba(0, 200, 255, 0.1);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
    }

    .comp-detail-label {
      color: #888;
      font-size: 10px;
      text-transform: uppercase;
    }

    .comp-detail-value {
      color: #00c8ff;
      font-weight: 700;
      margin-top: 2px;
    }

    .comp-controls {
      display: flex;
      gap: 6px;
    }

    .comp-btn {
      flex: 1;
      padding: 6px;
      background: rgba(0, 200, 255, 0.2);
      border: 1px solid #00c8ff;
      border-radius: 4px;
      color: #00c8ff;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .comp-btn:hover {
      background: rgba(0, 200, 255, 0.3);
    }

    .close-comparison {
      float: right;
      cursor: pointer;
      color: #888;
      font-size: 16px;
      transition: color 0.2s;
    }

    .close-comparison:hover {
      color: #fff;
    }

    .result-route {
      font-size: 15px;
      font-weight: 700;
      color: #00c8ff;
      margin-bottom: 6px;
    }

    .result-desc {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .result-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
    }

    /* Map */
    .map-container {
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 200, 255, 0.4);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 200, 255, 0.6);
    }

    /* Loading State */
    .loading {
      text-align: center;
      color: #888;
      padding: 20px;
      font-size: 13px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 200, 255, 0.3);
      border-top-color: #00c8ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ====== MOBILE RESPONSIVE ====== */
    @media (max-width: 1024px) {
      .header-content {
        flex-direction: column;
        gap: 12px;
      }

      .search-box {
        max-width: 100%;
      }

      .stats {
        gap: 10px;
      }

      .stat-number {
        font-size: 18px;
      }

      .sidebar {
        width: 180px;
      }

      .results-panel {
        width: 280px;
      }
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .header {
        padding: 12px 16px;
      }

      .header-content {
        flex-direction: column;
        gap: 12px;
      }

      .header-title h1 {
        font-size: 20px;
      }

      .search-box {
        flex-direction: column;
        gap: 8px;
        max-width: 100%;
      }

      .search-input-wrapper {
        width: 100%;
      }

      .search-input {
        padding: 10px 14px;
        font-size: 13px;
      }

      .swap-btn {
        width: 100%;
        padding: 10px;
      }

      .search-btn {
        width: 100%;
        padding: 10px;
        font-size: 13px;
      }

      .stats {
        gap: 12px;
        justify-content: flex-start;
      }

      .stat-number {
        font-size: 20px;
      }

      .stat-label {
        font-size: 10px;
      }

      .main-container {
        flex-direction: column;
        gap: 8px;
        padding: 8px;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        gap: 8px;
        overflow-x: auto;
        overflow-y: visible;
      }

      .panel {
        flex-shrink: 0;
        min-width: 200px;
      }

      .results-panel {
        width: 100%;
        max-height: 40vh;
        display: none;
      }

      .results-panel.active {
        display: flex;
      }

      .results-header {
        padding: 12px;
        font-size: 13px;
      }

      .results-list {
        padding: 8px;
      }

      .result-item {
        padding: 10px;
        margin-bottom: 8px;
      }

      .result-route {
        font-size: 13px;
        margin-bottom: 4px;
      }

      .result-desc {
        font-size: 11px;
        margin-bottom: 6px;
      }

      .result-info {
        font-size: 10px;
      }

      .map-container {
        width: 100%;
        height: 50vh;
        min-height: 300px;
      }

      .comparison-panel {
        width: calc(100% - 40px);
        bottom: 10px;
        left: 20px;
        right: 20px;
        max-height: 50vh;
      }

      .comparison-title {
        font-size: 12px;
      }

      .comp-route-id {
        font-size: 12px;
      }

      .comp-desc {
        font-size: 10px;
      }

      .comp-details {
        gap: 6px;
      }

      .comp-detail-item {
        padding: 5px 6px;
        font-size: 10px;
      }

      .comp-btn {
        font-size: 10px;
        padding: 5px;
      }

      .selected-route-info {
        padding: 10px;
        font-size: 11px;
      }

      .route-details {
        font-size: 11px;
      }

      /* Hide scrolls on mobile */
      .panel {
        padding: 12px;
      }

      .panel-title {
        font-size: 11px;
        margin-bottom: 10px;
      }

      .layer-item {
        padding: 6px;
        margin-bottom: 4px;
      }

      .layer-label {
        font-size: 12px;
      }

      .autocomplete-dropdown {
        max-height: 180px;
      }

      .autocomplete-item {
        padding: 8px 12px;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 10px 12px;
      }

      .header-title h1 {
        font-size: 18px;
      }

      .header-title p {
        font-size: 10px;
      }

      .search-box {
        gap: 6px;
      }

      .search-input {
        padding: 9px 12px;
        font-size: 12px;
      }

      .swap-btn {
        padding: 9px 8px;
        font-size: 14px;
      }

      .search-btn {
        padding: 9px 16px;
        font-size: 12px;
      }

      .stats {
        gap: 10px;
      }

      .stat-number {
        font-size: 16px;
      }

      .main-container {
        padding: 6px;
        gap: 6px;
      }

      .sidebar {
        max-height: 150px;
        padding: 6px 0;
      }

      .panel {
        min-width: 150px;
        padding: 10px;
      }

      .layer-item {
        padding: 5px;
        margin-bottom: 3px;
      }

      .layer-label {
        font-size: 11px;
      }

      .layer-color {
        width: 12px;
      }

      .toggle-switch {
        width: 36px;
        height: 20px;
      }

      .toggle-dot {
        width: 16px;
        height: 16px;
        top: 2px;
      }

      .toggle-switch.active .toggle-dot {
        left: 18px;
      }

      .results-panel {
        max-height: 35vh;
      }

      .results-header {
        padding: 10px;
        font-size: 12px;
      }

      .results-list {
        padding: 6px;
      }

      .result-item {
        padding: 8px;
        margin-bottom: 6px;
        border-radius: 6px;
      }

      .result-route {
        font-size: 12px;
        margin-bottom: 3px;
      }

      .result-desc {
        font-size: 10px;
        margin-bottom: 5px;
      }

      .result-info {
        font-size: 9px;
      }

      .map-container {
        height: 45vh;
        min-height: 250px;
      }

      .comparison-panel {
        width: calc(100% - 30px);
        bottom: 15px;
        left: 15px;
        right: 15px;
        padding: 12px;
        max-height: 45vh;
      }

      .comparison-title {
        font-size: 11px;
        margin-bottom: 10px;
      }

      .comparison-bus {
        padding: 10px;
        margin-bottom: 10px;
        border-left-width: 3px;
      }

      .comp-route-id {
        font-size: 11px;
        margin-bottom: 5px;
      }

      .comp-desc {
        font-size: 9px;
        margin-bottom: 6px;
      }

      .comp-details {
        grid-template-columns: 1fr 1fr;
        gap: 5px;
        margin-bottom: 6px;
      }

      .comp-detail-item {
        padding: 4px 5px;
        font-size: 9px;
      }

      .comp-detail-label {
        font-size: 8px;
      }

      .comp-detail-value {
        margin-top: 1px;
        font-size: 10px;
      }

      .comp-controls {
        gap: 4px;
      }

      .comp-btn {
        font-size: 9px;
        padding: 4px 6px;
      }

      .selected-route-info {
        padding: 8px;
        font-size: 10px;
      }

      .route-label {
        font-size: 10px;
        margin-bottom: 6px;
      }

      .route-details {
        font-size: 10px;
        line-height: 1.5;
      }

      .close-comparison {
        font-size: 14px;
      }

      /* Reduce animation on mobile */
      .result-item:hover {
        transform: none;
      }

      .swap-btn:hover {
        transform: none;
      }

      .search-btn:hover {
        transform: none;
      }

      /* Better touch targets */
      .layer-item,
      .autocomplete-item,
      .result-item,
      button {
        min-height: 44px;
        display: flex;
        align-items: center;
      }
    }

    /* Landscape mode adjustments */
    @media (max-width: 768px) and (orientation: landscape) {
      .header {
        padding: 8px 12px;
      }

      .header-title h1 {
        font-size: 16px;
      }

      .header-title p {
        display: none;
      }

      .stats {
        gap: 8px;
      }

      .stat-number {
        font-size: 14px;
      }

      .stat-label {
        font-size: 8px;
      }

      .main-container {
        flex-direction: row;
        padding: 6px;
      }

      .sidebar {
        width: auto;
        flex-direction: column;
        max-height: none;
        overflow-y: auto;
        gap: 6px;
      }

      .panel {
        min-width: 160px;
        max-width: 160px;
      }

      .results-panel {
        width: 200px;
        max-height: 100%;
      }

      .map-container {
        height: auto;
        flex: 1;
      }

      .comparison-panel {
        width: 250px;
        bottom: auto;
        top: 60px;
        left: 20px;
      }
    }

    /* Extra large screens */
    @media (min-width: 1440px) {
      .header-content {
        max-width: 1600px;
      }

      .sidebar {
        width: 280px;
      }

      .results-panel {
        width: 380px;
      }

      .search-box {
        max-width: 700px;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <div class="header-title">
        <div>
          <h1>🚌 Pune Bus Routes</h1>
          <p>Find your route instantly</p>
        </div>
      </div>

      <div class="search-box">
        <div class="search-input-wrapper">
          <input type="text" id="origin" class="search-input" placeholder="Enter origin..." />
          <div class="autocomplete-dropdown" id="origin-dropdown"></div>
        </div>
        <button class="swap-btn" onclick="swapLocations()" title="Swap">⇅</button>
        <div class="search-input-wrapper">
          <input type="text" id="destination" class="search-input" placeholder="Enter destination..." />
          <div class="autocomplete-dropdown" id="destination-dropdown"></div>
        </div>
        <button class="search-btn" onclick="searchBuses()">Search</button>
      </div>

      <div class="stats">
        <div class="stat-item">
          <div class="stat-number" id="route-count">1032</div>
          <div class="stat-label">Routes</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="signal-count">—</div>
          <div class="stat-label">Signals</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Container -->
  <div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Map Layers</div>
        <div class="layer-item" onclick="toggleLayer('roads')">
          <div class="layer-label">
            <div class="layer-color" style="background: #00c8ff;"></div>
            Roads
          </div>
          <div class="toggle-switch active" id="toggle-roads">
            <div class="toggle-dot"></div>
          </div>
        </div>
        <div class="layer-item" onclick="toggleLayer('signals')">
          <div class="layer-label">
            <div class="layer-color" style="background: #ff4444;"></div>
            Signals
          </div>
          <div class="toggle-switch active" id="toggle-signals">
            <div class="toggle-dot"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Legend</div>
        <div style="font-size: 12px; color: #aaa; line-height: 1.8;">
          <div><span style="display: inline-block; width: 14px; height: 2px; background: #00c8ff; vertical-align: middle;"></span> Roads</div>
          <div>🔴 Traffic Signals</div>
          <div>📍 Bus Stops</div>
        </div>
      </div>
    </div>

    <!-- Results Panel -->
    <div class="results-panel" id="results-panel">
      <div class="results-header">
        Available Routes
        <div style="font-size: 11px; color: #888; margin-top: 4px;">Click to view on map</div>
      </div>
      <div class="selected-route-info" id="selected-route-info">
        <div class="route-label">Selected Route</div>
        <div class="route-details" id="selected-route-details"></div>
      </div>
      <div class="results-list" id="results-list"></div>
    </div>

    <!-- Comparison Panel -->
    <div class="comparison-panel" id="comparison-panel">
      <div class="comparison-title">
        Compare Routes
        <span class="close-comparison" onclick="clearComparison()">✕</span>
      </div>
      <div id="comparison-list"></div>
    </div>

    <!-- Map -->
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <script>
    // ====== DATA ======
    let busData = [];
    let searchResults = [];
    let allLocations = [];
    let selectedRouteId = null;
    let comparedRoutes = [];
    let routeGeometries = {}; // Store OSRM route data
    let selectedRouteLayer = L.layerGroup();
    
    const colors = ['#00ff00', '#ff6600', '#00ffff', '#ff00ff', '#ffff00'];
    const colorNames = ['Green', 'Orange', 'Cyan', 'Magenta', 'Yellow'];

    // Extract all unique locations from bus routes
    function extractLocations() {
      const locations = new Set();
      busData.forEach(bus => {
        // Parse "Origin To Destination" format
        const parts = bus.description.split(' To ');
        if (parts.length === 2) {
          locations.add(parts[0].trim());
          locations.add(parts[1].trim());
        } else {
          // Fallback: split by common separators
          const words = bus.description.split(/[-–—]/);
          words.forEach(w => locations.add(w.trim()));
        }
      });
      allLocations = Array.from(locations).sort();
      console.log(`✓ Extracted ${allLocations.length} unique locations`);
    }

    // Show autocomplete suggestions
    function showSuggestions(inputId) {
      const input = document.getElementById(inputId);
      const dropdown = document.getElementById(inputId.replace('input', '') + '-dropdown');
      const value = input.value.toLowerCase().trim();

      if (value.length === 0) {
        dropdown.classList.remove('active');
        return;
      }

      const matches = allLocations.filter(loc => 
        loc.toLowerCase().includes(value)
      ).slice(0, 10);

      if (matches.length === 0) {
        dropdown.classList.remove('active');
        return;
      }

      dropdown.innerHTML = matches.map(loc => `
        <div class="autocomplete-item" onclick="selectLocation('${inputId}', '${loc}')">${loc}</div>
      `).join('');
      dropdown.classList.add('active');
    }

    function selectLocation(inputId, location) {
      document.getElementById(inputId).value = location;
      document.getElementById(inputId.replace('input', '') + '-dropdown').classList.remove('active');
    }

    // Load CSV data
    async function loadBusData() {
      try {
        const response = await fetch('c91c0878-b4f9-419f-8d7c-97eb6c7a9083.csv');
        const csv = await response.text();
        const lines = csv.split('\n').filter(line => line.trim());
        
        for (let i = 1; i < lines.length; i++) {
          const parts = lines[i].split(',');
          if (parts.length >= 4) {
            busData.push({
              id: parts[0].trim(),
              description: parts[1].trim(),
              marathi: parts[2].trim(),
              km: parseFloat(parts[3]) || 0
            });
          }
        }
        console.log(`✓ Loaded ${busData.length} bus routes`);
        extractLocations();
        document.getElementById('route-count').textContent = busData.length;
      } catch (err) {
        console.error('Error loading bus data:', err);
      }
    }

    // ====== MAP ======
    const map = L.map('map').setView([18.5204, 73.8567], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: 'Map data © OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    const roadLayer = L.layerGroup().addTo(map);
    const signalLayer = L.layerGroup().addTo(map);
    selectedRouteLayer.addTo(map);

    // Pune major landmarks/areas with coordinates
    const puneLandmarks = {
      'swargate': [18.4924, 73.8730],
      'katraj': [18.4574, 73.8647],
      'pune station': [18.5330, 73.8474],
      'fc road': [18.5258, 73.8498],
      'koregaon park': [18.5244, 73.8822],
      'baner': [18.5595, 73.7997],
      'kothrud': [18.5095, 73.8229],
      'shivaji nagar': [18.5333, 73.8641],
      'yerawada': [18.5569, 73.8751],
      'aundh': [18.5644, 73.8015],
      'pashan': [18.5597, 73.8062],
      'market yard': [18.5204, 73.8567],
      'camp': [18.5288, 73.8455],
      'laxmi road': [18.5154, 73.8505],
      'deccan': [18.5120, 73.8421],
      'erandwane': [18.5246, 73.8276],
      'viman nagar': [18.5721, 73.8865],
      'kalyani nagar': [18.5681, 73.8795]
    };

    // Get coordinates for a location
    function getLocationCoord(location) {
      const key = location.toLowerCase().trim();
      for (let [landmark, coord] of Object.entries(puneLandmarks)) {
        if (key.includes(landmark)) {
          return coord;
        }
      }
      // Default to a random location in Pune
      return [18.5204 + Math.random() * 0.05, 73.8567 + Math.random() * 0.05];
    }

    // Get actual route from OSRM API
    async function getRouteGeometry(origin, destination, routeId) {
      try {
        const originCoord = getLocationCoord(origin);
        const destCoord = getLocationCoord(destination);
        
        const url = `https://router.project-osrm.org/route/v1/driving/${originCoord[1]},${originCoord[0]};${destCoord[1]},${destCoord[0]}?geometries=geojson&overview=full`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.routes && data.routes.length > 0) {
          const route = data.routes[0];
          routeGeometries[routeId] = {
            geometry: route.geometry.coordinates.map(c => [c[1], c[0]]), // Convert to [lat,lng]
            distance: route.distance / 1000, // Convert to km
            duration: Math.round(route.duration / 60), // Convert to minutes
            originCoord: originCoord,
            destCoord: destCoord
          };
          console.log(`✓ Route ${routeId}: ${routeGeometries[routeId].distance.toFixed(2)} km, ${routeGeometries[routeId].duration} min`);
          return routeGeometries[routeId];
        }
      } catch (err) {
        console.error(`Error getting route for ${routeId}:`, err);
      }
      return null;
    }

    // Draw selected route on map with actual geometry
    async function drawRoute(bus) {
      selectedRouteLayer.clearLayers();
      
      const parts = bus.description.split(' To ');
      let origin = parts[0] ? parts[0].trim() : 'Start';
      let destination = parts[1] ? parts[1].trim() : 'End';

      // Get actual route from OSRM
      let routeData = routeGeometries[bus.id];
      if (!routeData) {
        routeData = await getRouteGeometry(origin, destination, bus.id);
      }

      if (routeData && routeData.geometry.length > 0) {
        // Draw actual route line
        L.polyline(routeData.geometry, {
          color: '#00ff00',
          weight: 4,
          opacity: 0.8,
          className: 'selected-route-line'
        }).addTo(selectedRouteLayer);

        // Add start marker
        L.circleMarker(routeData.originCoord, {
          radius: 12,
          fillColor: '#00ff00',
          color: '#ffffff',
          weight: 3,
          opacity: 1,
          fillOpacity: 0.9
        }).bindPopup(`<div style="color: #333; font-size: 12px;"><strong>START</strong><br>${origin}</div>`).addTo(selectedRouteLayer);

        // Add end marker
        L.circleMarker(routeData.destCoord, {
          radius: 12,
          fillColor: '#ff6600',
          color: '#ffffff',
          weight: 3,
          opacity: 1,
          fillOpacity: 0.9
        }).bindPopup(`<div style="color: #333; font-size: 12px;"><strong>END</strong><br>${destination}</div>`).addTo(selectedRouteLayer);

        // Fit map to route bounds
        const bounds = L.latLngBounds(routeData.geometry);
        map.fitBounds(bounds, { padding: [80, 80] });
      }
    }

    // Draw compared routes with different colors
    async function drawComparedRoutes() {
      selectedRouteLayer.clearLayers();

      for (let i = 0; i < comparedRoutes.length; i++) {
        const bus = busData.find(b => b.id === comparedRoutes[i]);
        if (!bus) continue;

        const parts = bus.description.split(' To ');
        const origin = parts[0] ? parts[0].trim() : 'Start';
        const destination = parts[1] ? parts[1].trim() : 'End';

        let routeData = routeGeometries[bus.id];
        if (!routeData) {
          routeData = await getRouteGeometry(origin, destination, bus.id);
        }

        if (routeData && routeData.geometry.length > 0) {
          const color = colors[i % colors.length];
          
          // Draw route line
          L.polyline(routeData.geometry, {
            color: color,
            weight: 3,
            opacity: 0.7,
            dashArray: i > 0 ? '5, 5' : ''
          }).bindPopup(`<div style="color: #333;"><strong>Route ${bus.id}</strong><br>${routeData.distance.toFixed(1)} km</div>`).addTo(selectedRouteLayer);

          // Add markers
          L.circleMarker(routeData.originCoord, {
            radius: 8,
            fillColor: color,
            color: '#ffffff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8
          }).addTo(selectedRouteLayer);

          L.circleMarker(routeData.destCoord, {
            radius: 8,
            fillColor: color,
            color: '#ffffff',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8
          }).addTo(selectedRouteLayer);
        }
      }

      // Fit map to all compared routes
      if (comparedRoutes.length > 0) {
        let allCoords = [];
        comparedRoutes.forEach(id => {
          if (routeGeometries[id]) {
            allCoords = allCoords.concat(routeGeometries[id].geometry);
          }
        });
        if (allCoords.length > 0) {
          const bounds = L.latLngBounds(allCoords);
          map.fitBounds(bounds, { padding: [100, 100] });
        }
      }
    }

    // Load map data from Overpass API
    async function loadMapData() {
      try {
        const bbox = '18.40,73.72,18.65,73.99';
        const query = `[out:json][timeout:30];(way["highway"~"^(primary|secondary)$"](${bbox});node["highway"="traffic_signals"](${bbox}););out body;>;out skel qt;`;
        
        const response = await fetch('https://overpass-api.de/api/interpreter', {
          method: 'POST',
          body: 'data=' + encodeURIComponent(query)
        });

        const data = await response.json();
        
        // Add roads
        const nodeMap = {};
        data.elements.forEach(el => {
          if (el.type === 'node') nodeMap[el.id] = el;
        });

        let signalCount = 0;
        data.elements.forEach(el => {
          if (el.type === 'way' && el.tags && el.tags.highway) {
            const coords = el.nodes.map(id => nodeMap[id]).filter(n => n).map(n => [n.lat, n.lon]);
            if (coords.length > 1) {
              L.polyline(coords, { color: '#00c8ff', weight: 2, opacity: 0.7 }).addTo(roadLayer);
            }
          }
          if (el.type === 'node' && el.tags && el.tags.highway === 'traffic_signals') {
            L.circleMarker([el.lat, el.lon], {
              radius: 6,
              fillColor: '#ff4444',
              color: '#ff8888',
              weight: 2,
              opacity: 0.8,
              fillOpacity: 0.7
            }).addTo(signalLayer);
            signalCount++;
          }
        });
        
        document.getElementById('signal-count').textContent = signalCount;
      } catch (err) {
        console.error('Error loading map data:', err);
      }
    }

    // ====== SEARCH ======
    function swapLocations() {
      const origin = document.getElementById('origin');
      const destination = document.getElementById('destination');
      [origin.value, destination.value] = [destination.value, origin.value];
    }

    function searchBuses() {
      const origin = document.getElementById('origin').value.toLowerCase();
      const destination = document.getElementById('destination').value.toLowerCase();

      if (!origin || !destination) {
        alert('Please enter origin and destination');
        return;
      }

      searchResults = busData.filter(bus => {
        const desc = bus.description.toLowerCase();
        const hasOrigin = desc.includes(origin);
        const hasDestination = desc.includes(destination);
        
        if (hasOrigin && hasDestination) {
          return bus;
        }
      });

      if (searchResults.length === 0) {
        searchResults = busData.filter(bus => {
          const desc = bus.description.toLowerCase();
          return desc.includes(origin) || desc.includes(destination);
        });
      }

      selectedRouteId = null;
      selectedRouteLayer.clearLayers();
      document.getElementById('selected-route-info').classList.remove('active');
      displayResults();
    }

    function displayResults() {
      const panel = document.getElementById('results-panel');
      const list = document.getElementById('results-list');

      if (searchResults.length === 0) {
        list.innerHTML = '<div class="loading">No routes found<br><small>Try different location names</small></div>';
      } else {
        list.innerHTML = searchResults.map(bus => `
          <div class="result-item ${selectedRouteId === bus.id ? 'selected' : ''} ${comparedRoutes.includes(bus.id) ? 'compared' : ''}" onclick="selectRoute('${bus.id}')">
            <div class="result-route">Route ${bus.id}</div>
            <div class="result-desc">${bus.description}</div>
            <div class="result-info">
              <span>📍 ${bus.km} km</span>
              <span>🕐 ~${Math.round(bus.km / 25 * 60)} min</span>
              <span>💰 ₹${Math.max(20, 20 + Math.ceil(bus.km - 5) * 2)}</span>
            </div>
            <div style="font-size: 10px; color: #888; margin-top: 8px; cursor: pointer;" onclick="toggleCompare('${bus.id}', event)">
              ${comparedRoutes.includes(bus.id) ? '✓ In Comparison' : '+ Compare'}
            </div>
          </div>
        `).join('');
      }

      panel.classList.add('active');
    }

    async function selectRoute(routeId) {
      const bus = busData.find(b => b.id === routeId);
      if (!bus) return;

      selectedRouteId = routeId;
      comparedRoutes = [routeId];
      
      const parts = bus.description.split(' To ');
      const origin = parts[0] ? parts[0].trim() : 'Start';
      const destination = parts[1] ? parts[1].trim() : 'End';

      // Get route geometry if not cached
      if (!routeGeometries[routeId]) {
        await getRouteGeometry(origin, destination, routeId);
      }

      const routeData = routeGeometries[routeId];
      let actualDistance = bus.km;
      let actualTime = Math.round(bus.km / 25 * 60);

      if (routeData) {
        actualDistance = routeData.distance.toFixed(1);
        actualTime = routeData.duration;
      }

      const fare = Math.max(20, 20 + Math.ceil(actualDistance - 5) * 2);

      // Update selected route info
      document.getElementById('selected-route-details').innerHTML = `
        <strong>Route ${bus.id}</strong><br>
        ${bus.description}<br>
        <span style="color: #888;">📍 ${actualDistance} km | 🕐 ${actualTime} min | 💰 ₹${fare}</span>
      `;
      document.getElementById('selected-route-info').classList.add('active');

      // Highlight selected item
      document.querySelectorAll('.result-item').forEach(item => {
        item.classList.remove('selected');
      });
      event.target.closest('.result-item').classList.add('selected');

      // Draw route on map
      await drawRoute(bus);
      
      // Update comparison panel
      updateComparisonPanel();
    }

    function toggleCompare(routeId, event) {
      event.stopPropagation();
      
      if (comparedRoutes.includes(routeId)) {
        comparedRoutes = comparedRoutes.filter(id => id !== routeId);
      } else {
        if (comparedRoutes.length < 5) {
          comparedRoutes.push(routeId);
        } else {
          alert('Maximum 5 routes can be compared');
          return;
        }
      }

      updateComparisonPanel();
    }

    function updateComparisonPanel() {
      const panel = document.getElementById('comparison-panel');
      const list = document.getElementById('comparison-list');

      if (comparedRoutes.length === 0) {
        panel.classList.remove('active');
        return;
      }

      let html = '';
      for (let i = 0; i < comparedRoutes.length; i++) {
        const bus = busData.find(b => b.id === comparedRoutes[i]);
        if (!bus) continue;

        const routeData = routeGeometries[bus.id];
        const distance = routeData ? routeData.distance.toFixed(1) : bus.km;
        const time = routeData ? routeData.duration : Math.round(bus.km / 25 * 60);
        const fare = Math.max(20, 20 + Math.ceil(distance - 5) * 2);

        html += `
          <div class="comparison-bus route-${i + 1}">
            <div class="comp-route-id">🚌 Route ${bus.id}</div>
            <div class="comp-desc">${bus.description}</div>
            <div class="comp-details">
              <div class="comp-detail-item">
                <div class="comp-detail-label">Distance</div>
                <div class="comp-detail-value">${distance} km</div>
              </div>
              <div class="comp-detail-item">
                <div class="comp-detail-label">Time</div>
                <div class="comp-detail-value">${time} min</div>
              </div>
              <div class="comp-detail-item">
                <div class="comp-detail-label">Avg Speed</div>
                <div class="comp-detail-value">${(distance / (time / 60)).toFixed(1)} km/h</div>
              </div>
              <div class="comp-detail-item">
                <div class="comp-detail-label">Est. Fare</div>
                <div class="comp-detail-value">₹${fare}</div>
              </div>
            </div>
            <div class="comp-controls">
              <button class="comp-btn" onclick="selectRoute('${bus.id}')">View</button>
              <button class="comp-btn" onclick="toggleCompare('${bus.id}', event)">Remove</button>
            </div>
          </div>
        `;
      }

      list.innerHTML = html;
      panel.classList.add('active');

      // Draw all compared routes
      if (comparedRoutes.length > 1) {
        drawComparedRoutes();
      } else if (comparedRoutes.length === 1) {
        drawRoute(busData.find(b => b.id === comparedRoutes[0]));
      }
    }

    function clearComparison() {
      comparedRoutes = [];
      selectedRouteId = null;
      document.getElementById('comparison-panel').classList.remove('active');
      document.getElementById('selected-route-info').classList.remove('active');
      selectedRouteLayer.clearLayers();
      displayResults();
    }

    function toggleLayer(layer) {
      const toggle = document.getElementById(`toggle-${layer}`);
      toggle.classList.toggle('active');
      
      if (layer === 'roads') {
        roadLayer.remove();
        if (toggle.classList.contains('active')) {
          roadLayer.addTo(map);
        }
      } else if (layer === 'signals') {
        signalLayer.remove();
        if (toggle.classList.contains('active')) {
          signalLayer.addTo(map);
        }
      }
    }

    // ====== INIT ======
    document.getElementById('origin').addEventListener('input', () => showSuggestions('origin'));
    document.getElementById('destination').addEventListener('input', () => showSuggestions('destination'));
    document.getElementById('origin').addEventListener('keypress', e => { if (e.key === 'Enter') searchBuses(); });
    document.getElementById('destination').addEventListener('keypress', e => { if (e.key === 'Enter') searchBuses(); });

    // Close dropdowns when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-input-wrapper')) {
        document.querySelectorAll('.autocomplete-dropdown').forEach(dd => dd.classList.remove('active'));
      }
    });

    loadBusData();
    loadMapData();
  </script>
</body>
</html>
